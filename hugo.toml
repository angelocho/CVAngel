baseURL = 'https://cloudcvangel.netlify.app/'
title = 'Mi Portfolio | Ángel Bocalandro'
defaultContentLanguage = 'es'
languageCode = 'es'
theme = 'loveit'
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

# Configuración del sitio
[params]
  description = "Portfolio de Ángel Bocalandro - DevOps Engineer especializado en AWS, Kubernetes, Terraform y automatización. Experiencia en infraestructura cloud, CI/CD y containerización."
  title = "Mi Portfolio"
  images = ["/images/avatar.png"]
  keywords = "DevOps, AWS, Kubernetes, Docker, Terraform, CI/CD, Automatización, Cloud, Infrastructure"
  
  # Información del autor
  [params.author]
    name = "Ángel Bocalandro Ruiz"
    link = "https://cloudcvangel.netlify.app"
  
  # Redes sociales
  [params.social]
    email = "angelocho64@gmail.com"
    github = "angelocho"
    linkedin = "ángel-bocalandro-ruiz-ab7221231/"
    
    [params.social.openGraph]
      enable = true
    
    [params.social.twitterCard]
      enable = true
  
  # Avatar
  avatar = "avatar.jpg"
  
  # Header title config - Sobrescribir del tema
  [params.header]
    [params.header.title]
      name = "Mi Portfolio"
  
  # App config - Sobrescribir del tema
  [params.app]
    title = "Mi Portfolio"
    noFavicon = false
    svgFavicon = ""
  
  # Home profile config - Sobrescribir del tema
  [params.home]
    [params.home.profile]
      subtitle = "DevOps Engineer | Cloud & Infrastructure Specialist"

# Configuración de idiomas
[languages]
  [languages.es]
    weight = 1
    languageCode = "es"
    languageName = "Español"
    title = "Mi Portfolio"
    
    [languages.es.menu]
